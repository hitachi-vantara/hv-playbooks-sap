---
####################################################################
# Example : LDEV Facts Playbook
####################################################################
- name: Logical Device Facts
  hosts: localhost
  gather_facts: false

  vars_files:
    - ~/playbooks/ansible_vault_vars/ansible_vault_storage_var.yml

  vars:
    # Common connection info for all tasks
    connection_info:
      address: "{{ storage_address }}"
      username: "{{ vault_storage_username }}"
      password: "{{ vault_storage_secret }}"

  tasks:
    ####################################################################
    # Task Name : Get ldevs from Pool ID
    ####################################################################
    - name: Get Ldev details using pool id
      hitachivantara.vspone_block.vsp.hv_ldev_facts:
        connection_info: "{{ connection_info }}"
        spec:
          pool_id: 2
      register: result

    - name: Extract only ldev_id values
      ansible.builtin.set_fact:
        ldev_ids: "{{ result.ansible_facts.volumes | map(attribute='ldev_id') | list }}"

    - name: Debug the result variable
      ansible.builtin.debug:
        var: ldev_ids

